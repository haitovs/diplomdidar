<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Didar Network Playground v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0f1a;
      color: #f8fafc;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      padding: 12px 20px;
      background: rgba(15, 23, 42, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 100;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 1;
    }

    .divider {
      width: 1px;
      height: 24px;
      background: rgba(255, 255, 255, 0.1);
      margin: 0 8px;
    }

    .toolbar-group {
      display: flex;
      gap: 4px;
      padding: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
    }

    .tool-btn {
      padding: 8px 14px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: #94a3b8;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .tool-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #f8fafc;
    }

    .tool-btn.active {
      background: rgba(99, 102, 241, 0.3);
      color: #a5b4fc;
    }

    .tool-btn .icon {
      font-size: 16px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-weight: 500;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    /* Main layout */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 260px 1fr 300px;
      overflow: hidden;
    }

    /* Left sidebar - Device Palette */
    .sidebar-left,
    .sidebar-right {
      background: rgba(15, 23, 42, 0.8);
      overflow-y: auto;
      overflow-x: hidden;
      /* Added to hide horizontal scrollbar */
      padding: 16px;
    }

    .sidebar-left {
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    .sidebar-right {
      border-left: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Hide scrollbars but keep functionality */
    .sidebar-left::-webkit-scrollbar,
    .sidebar-right::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-left::-webkit-scrollbar-thumb,
    .sidebar-right::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }

    .sidebar-left::-webkit-scrollbar-track,
    .sidebar-right::-webkit-scrollbar-track {
      background: transparent;
    }

    /* Firefox */
    .sidebar-left,
    .sidebar-right {
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
    }

    /* Canvas area */
    .canvas-area {
      position: relative;
      background: #0a0f1a;
      overflow: hidden;
    }

    #playground-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .canvas-overlay {
      position: absolute;
      bottom: 16px;
      left: 16px;
      display: flex;
      gap: 12px;
    }

    .overlay-panel {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 12px 16px;
    }

    .mode-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mode-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }

    .mode-text {
      font-size: 13px;
      font-weight: 500;
    }

    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .zoom-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
      cursor: pointer;
      font-size: 14px;
    }

    .zoom-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .zoom-level {
      font-size: 12px;
      color: #94a3b8;
      min-width: 40px;
      text-align: center;
    }

    /* Right sidebar - Property Editor */
    .sidebar-right {
      background: rgba(15, 23, 42, 0.8);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      overflow-y: auto;
      padding: 16px;
    }

    .sidebar-title {
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    /* Instructions panel */
    .instructions {
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .instructions h4 {
      font-size: 13px;
      margin-bottom: 8px;
      color: #a5b4fc;
    }

    .instructions ul {
      list-style: none;
      font-size: 12px;
      color: #94a3b8;
    }

    .instructions li {
      padding: 4px 0;
    }

    .instructions kbd {
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 11px;
    }

    /* Topology stats */
    .topology-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #6366f1;
    }

    .stat-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <header class="app-toolbar">
    <div class="container">
      <div class="logo">🎮 Network Topology Editor</div>
      <div class="toolbar">
        <a href="index-v2.html" class="tool-btn" style="text-decoration: none;">
          <span class="icon">←</span> Back to Menu
        </a>

        <div class="divider"></div>

        <button class="tool-btn" id="tool-select" data-mode="select">
          <span class="icon">🖱</span> Select
        </button>
        <button class="tool-btn" id="tool-addNode" data-mode="addNode">
          <span class="icon">➕</span> Add Node
        </button>
        <button class="tool-btn" data-mode="addLink" title="Add Link (L)">
          <span class="icon">🔗</span> Link
        </button>
        <button class="tool-btn" data-mode="delete" title="Delete (Del)">
          <span class="icon">🗑️</span> Delete
        </button>
      </div>

      <div class="toolbar-group">
        <button class="tool-btn" id="btn-undo" title="Undo (Ctrl+Z)">
          <span class="icon">↩️</span>
        </button>
        <button class="tool-btn" id="btn-redo" title="Redo (Ctrl+Y)">
          <span class="icon">↪️</span>
        </button>
      </div>

      <div class="toolbar-group">
        <button class="tool-btn" id="btn-clear" title="Clear all">
          <span class="icon">🧹</span> Clear
        </button>
        <button class="tool-btn" id="btn-template" title="Load template">
          <span class="icon">📋</span> Templates
        </button>
      </div>
    </div>

    <div class="header-actions">
      <button class="btn btn-secondary" id="btn-import">
        <span>📁</span> Import
      </button>
      <button class="btn btn-secondary" id="btn-export">
        <span>💾</span> Export
      </button>
      <button class="btn btn-primary" id="btn-simulate">
        <span>▶️</span> Simulate
      </button>
    </div>
  </header>

  <main>
    <aside class="sidebar-left">
      <div class="sidebar-title">Device Palette</div>
      <div id="device-palette"></div>
    </aside>

    <section class="canvas-area">
      <canvas id="playground-canvas"></canvas>

      <div class="canvas-overlay">
        <div class="overlay-panel mode-indicator">
          <div class="mode-dot" id="mode-dot"></div>
          <span class="mode-text" id="mode-text">Select Mode</span>
        </div>

        <div class="overlay-panel zoom-controls">
          <button class="zoom-btn" id="zoom-out">−</button>
          <span class="zoom-level" id="zoom-level">100%</span>
          <button class="zoom-btn" id="zoom-in">+</button>
        </div>
      </div>
    </section>

    <aside class="sidebar-right">
      <div class="sidebar-title">Properties</div>
      <div id="property-editor"></div>

      <div class="instructions">
        <h4>💡 Quick Tips</h4>
        <ul>
          <li>Drag devices from palette to canvas</li>
          <li><kbd>V</kbd> Select mode</li>
          <li><kbd>N</kbd> Add node mode</li>
          <li><kbd>L</kbd> Add link mode</li>
          <li><kbd>Del</kbd> Delete selected</li>
          <li><kbd>Ctrl+Z</kbd> Undo</li>
          <li><kbd>Ctrl+Y</kbd> Redo</li>
        </ul>
      </div>

      <div class="sidebar-title">Topology Stats</div>
      <div class="topology-stats">
        <div class="stat-card">
          <div class="stat-value" id="stat-nodes">0</div>
          <div class="stat-label">Nodes</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-links">0</div>
          <div class="stat-label">Links</div>
        </div>
      </div>
    </aside>
  </main>

  <input type="file" id="file-import" accept=".json" style="display: none;" />

  <script type="module">
    import { CanvasRenderer } from './src/rendering/CanvasRenderer.js';
    import { DevicePalette } from './src/playground/DevicePalette.js';
    import { TopologyEditor } from './src/playground/TopologyEditor.js';
    import { PropertyEditor } from './src/playground/PropertyEditor.js';

    // Initialize canvas
    const canvas = document.getElementById('playground-canvas');
    const renderer = new CanvasRenderer(canvas, { showGrid: true });

    // Preload icons
    const iconCache = new Map();
    const iconNames = ['router', 'switch', 'server', 'firewall', 'wifi', 'sensor', 'cloud', 'lab'];

    Promise.all(iconNames.map(name => {
      return new Promise((resolve) => {
        const img = new Image();
        img.src = `icons/${name}.svg`;
        img.onload = () => {
          iconCache.set(name + '.svg', img);
          iconCache.set(name, img);
          resolve();
        };
        img.onerror = () => resolve();
      });
    })).then(() => {
      renderer.setIconCache(iconCache);
      renderer.start();
    });

    // ==========================================
    // Pan & Zoom Logic (Bug Fix Implementation)
    // ==========================================

    // Canvas transform state
    let canvasTransform = {
      scale: 1,
      offsetX: 0,
      offsetY: 0,
      isDragging: false,
      dragStart: { x: 0, y: 0 }
    };

    // Zoom with mouse wheel
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      const newScale = Math.min(Math.max(0.5, canvasTransform.scale * delta), 3);

      // Zoom towards mouse position
      canvasTransform.offsetX = mouseX - (mouseX - canvasTransform.offsetX) * (newScale / canvasTransform.scale);
      canvasTransform.offsetY = mouseY - (mouseY - canvasTransform.offsetY) * (newScale / canvasTransform.scale);
      canvasTransform.scale = newScale;

      // Update zoom display
      document.getElementById('zoom-level').textContent = Math.round(newScale * 100) + '%';

      if (renderer.setTransform) {
        renderer.setTransform(canvasTransform);
      }
    });

    // Pan with middle mouse or shift+drag
    canvas.addEventListener('mousedown', (e) => {
      // Middle mouse or Shift+Left Click for panning
      if (e.button === 1 || (e.button === 0 && e.shiftKey)) {
        e.preventDefault();
        canvasTransform.isDragging = true;
        canvasTransform.dragStart = { x: e.clientX, y: e.clientY };
        canvas.style.cursor = 'grabbing';
      }
    });

    canvas.addEventListener('mousemove', (e) => {
      if (canvasTransform.isDragging) {
        // Calculate delta
        const dx = e.clientX - canvasTransform.dragStart.x;
        const dy = e.clientY - canvasTransform.dragStart.y;

        canvasTransform.offsetX += dx;
        canvasTransform.offsetY += dy;
        canvasTransform.dragStart = { x: e.clientX, y: e.clientY };

        if (renderer.setTransform) {
          renderer.setTransform(canvasTransform);
        }
      }
    });

    canvas.addEventListener('mouseup', () => {
      if (canvasTransform.isDragging) {
        canvasTransform.isDragging = false;
        // Reset cursor based on current mode
        canvas.style.cursor = editor && editor.mode === 'select' ? 'default' : 'crosshair';
      }
    });

    // Override existing zoom buttons
    // We use a slight delay to ensure we override any previous listeners if possible, 
    // or just rely on this being executed after DOM load
    const zoomInBtn = document.getElementById('zoom-in');
    const zoomOutBtn = document.getElementById('zoom-out');

    if (zoomInBtn) {
      // Clone to remove old listeners
      const newZoomIn = zoomInBtn.cloneNode(true);
      zoomInBtn.parentNode.replaceChild(newZoomIn, zoomInBtn);

      newZoomIn.addEventListener('click', () => {
        canvasTransform.scale = Math.min(canvasTransform.scale * 1.2, 3);
        document.getElementById('zoom-level').textContent = Math.round(canvasTransform.scale * 100) + '%';
        if (renderer.setTransform) renderer.setTransform(canvasTransform);
      });
    }

    if (zoomOutBtn) {
      const newZoomOut = zoomOutBtn.cloneNode(true);
      zoomOutBtn.parentNode.replaceChild(newZoomOut, zoomOutBtn);

      newZoomOut.addEventListener('click', () => {
        canvasTransform.scale = Math.max(canvasTransform.scale * 0.8, 0.5);
        document.getElementById('zoom-level').textContent = Math.round(canvasTransform.scale * 100) + '%';
        if (renderer.setTransform) renderer.setTransform(canvasTransform);
      });
    }


    // Initialize editor
    const editor = new TopologyEditor(canvas, renderer, {
      onNodeSelect: (node) => {
        propertyEditor.editNode(node);
      },
      onTopologyChange: (topology) => {
        updateStats(topology);
      },
    });

    // Initialize device palette
    const palette = new DevicePalette(document.getElementById('device-palette'), {
      onDeviceSelect: (deviceType) => {
        editor.setPendingDevice(deviceType);
        updateModeIndicator('addNode', deviceType);
      },
      onDeviceDragStart: (deviceType) => {
        // Device is being dragged
      },
    });

    // Initialize property editor
    const propertyEditor = new PropertyEditor(document.getElementById('property-editor'), {
      onPropertyChange: (type, id, updates) => {
        if (type === 'node') {
          editor.updateNode(id, updates);
        }
        renderer.setTopology(editor.getTopology());
      },
      onDelete: (type, id) => {
        if (type === 'node') {
          editor.deleteNode(id);
        } else if (type === 'link') {
          editor.deleteLink(id);
        }
        propertyEditor.clear();
      },
    });

    // Toolbar mode buttons
    document.querySelectorAll('.tool-btn[data-mode]').forEach(btn => {
      btn.addEventListener('click', () => {
        const mode = btn.dataset.mode;
        document.querySelectorAll('.tool-btn[data-mode]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        editor.setMode(mode);
        updateModeIndicator(mode);
        palette.clearSelection();
      });
    });

    // Undo/Redo
    document.getElementById('btn-undo').addEventListener('click', () => editor.undo());
    document.getElementById('btn-redo').addEventListener('click', () => editor.redo());

    // Clear
    document.getElementById('btn-clear').addEventListener('click', () => {
      if (confirm('Clear all nodes and links?')) {
        editor.clear();
        propertyEditor.clear();
      }
    });

    // Templates
    document.getElementById('btn-template').addEventListener('click', () => {
      const template = {
        nodes: [
          { id: 'n1', label: 'Core Router', type: 'coreRouter', position: { x: 0.5, y: 0.2 }, load: 0.6 },
          { id: 'n2', label: 'Switch A', type: 'switch', position: { x: 0.3, y: 0.5 }, load: 0.4 },
          { id: 'n3', label: 'Switch B', type: 'switch', position: { x: 0.7, y: 0.5 }, load: 0.5 },
          { id: 'n4', label: 'Server', type: 'server', position: { x: 0.5, y: 0.8 }, load: 0.7 },
        ],
        links: [
          { id: 'l1', source: 'n1', target: 'n2', type: 'fiber' },
          { id: 'l2', source: 'n1', target: 'n3', type: 'fiber' },
          { id: 'l3', source: 'n2', target: 'n4', type: 'ethernet' },
          { id: 'l4', source: 'n3', target: 'n4', type: 'ethernet' },
        ],
      };
      editor.loadTopology(template);
    });

    // Import/Export
    const fileInput = document.getElementById('file-import');

    document.getElementById('btn-import').addEventListener('click', () => {
      fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) {
        editor.importJSON(e.target.files[0]);
        e.target.value = '';
      }
    });

    document.getElementById('btn-export').addEventListener('click', () => {
      editor.exportJSON();
    });

    // Simulate button
    document.getElementById('btn-simulate').addEventListener('click', () => {
      const topology = editor.getTopology();
      localStorage.setItem('playground-topology', JSON.stringify(topology));
      window.open('demo-v2.html', '_blank');
    });

    // Update mode indicator
    function updateModeIndicator(mode, detail = '') {
      const modeText = document.getElementById('mode-text');
      const modeDot = document.getElementById('mode-dot');

      const modes = {
        select: { text: 'Select Mode', color: '#10b981' },
        addNode: { text: `Add Node${detail ? ': ' + detail : ''}`, color: '#3b82f6' },
        addLink: { text: 'Add Link Mode', color: '#f59e0b' },
        delete: { text: 'Delete Mode', color: '#ef4444' },
      };

      const config = modes[mode] || modes.select;
      modeText.textContent = config.text;
      modeDot.style.background = config.color;
    }

    // Update topology stats
    function updateStats(topology) {
      document.getElementById('stat-nodes').textContent = topology.nodes.length;
      document.getElementById('stat-links').textContent = topology.links.length;
    }

    document.getElementById('zoom-in').addEventListener('click', () => {
      zoom = Math.min(200, zoom + 10);
      document.getElementById('zoom-level').textContent = zoom + '%';
    });
    document.getElementById('zoom-out').addEventListener('click', () => {
      zoom = Math.max(50, zoom - 10);
      document.getElementById('zoom-level').textContent = zoom + '%';
    });
  </script>
</body>

</html>
