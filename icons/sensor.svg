<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="sensorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <circle cx="32" cy="32" r="20" fill="#1e293b" stroke="url(#sensorGrad)" stroke-width="2"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="12" fill="none" stroke="url(#sensorGrad)" stroke-width="1.5" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="6" fill="url(#sensorGrad)"/>
  <!-- Sensor rays -->
  <line x1="32" y1="8" x2="32" y2="14" stroke="url(#sensorGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="50" x2="32" y2="56" stroke="url(#sensorGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="8" y1="32" x2="14" y2="32" stroke="url(#sensorGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="32" x2="56" y2="32" stroke="url(#sensorGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Status LED -->
  <circle cx="32" cy="32" r="3" fill="#22c55e"/>
</svg>