<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network Training Simulator - Analytics Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0f1a;
      color: #f8fafc;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 12px 20px;
      background: rgba(15, 23, 42, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, #22c55e, #14b8a6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      min-width: 0;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-weight: 500;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 20px;
      font-size: 12px;
      color: #22c55e;
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr minmax(280px, 320px) minmax(260px, 300px);
      overflow: hidden;
    }

    .canvas-area {
      position: relative;
      background: #0a0f1a;
    }

    #analytics-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .time-control {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
    }

    .time-display {
      font-size: 24px;
      font-weight: 700;
      font-family: monospace;
      color: #22c55e;
    }

    .speed-control {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .speed-btn {
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #94a3b8;
      cursor: pointer;
      font-size: 12px;
      min-width: 0;
    }

    .speed-btn.active {
      background: rgba(34, 197, 94, 0.2);
      border-color: #22c55e;
      color: #22c55e;
    }

    .sidebar {
      background: rgba(15, 23, 42, 0.8);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px;
      overflow-y: auto;
      overflow-x: hidden;
      min-width: 0;
      scrollbar-gutter: stable both-edges;
    }

    /* Hide sidebar scrollbar */
    .sidebar::-webkit-scrollbar {
      width: 0;
      display: none;
    }

    .sidebar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Fix chart overflow */
    #analytics-panel {
      max-height: calc(100vh - 200px);
      overflow-y: auto;
      overflow-x: hidden;
    }

    .chart-wrapper {
      max-height: 300px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .chart-wrapper canvas {
      max-width: 100%;
      height: auto !important;
    }

    .sidebar-title {
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .back-link {
      text-decoration: none;
    }

    #lab-summary {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .lab-summary-card {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      padding: 10px;
    }

    .lab-summary-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #e2e8f0;
    }

    .lab-summary-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .lab-scoreline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      gap: 8px;
    }

    .lab-scoreline strong {
      font-size: 16px;
    }

    .lab-scoreline .pass {
      color: #22c55e;
    }

    .lab-scoreline .warn {
      color: #f59e0b;
    }

    .lab-scoreline .progress {
      color: #38bdf8;
    }

    .lab-objective-list,
    .lab-recommend-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .lab-objective-item,
    .lab-recommend-item {
      font-size: 11px;
      line-height: 1.35;
      border-left: 3px solid rgba(148, 163, 184, 0.45);
      background: rgba(255, 255, 255, 0.02);
      padding: 6px 8px;
      border-radius: 6px;
      color: #cbd5e1;
    }

    .lab-objective-item.fail {
      border-left-color: #f59e0b;
    }

    .lab-objective-item.pass {
      border-left-color: #22c55e;
    }

    .lab-empty {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.5;
      background: rgba(255, 255, 255, 0.02);
      border: 1px dashed rgba(148, 163, 184, 0.35);
      border-radius: 8px;
      padding: 12px;
    }

    .btn:focus-visible,
    .speed-btn:focus-visible {
      outline: 2px solid rgba(34, 197, 94, 0.9);
      outline-offset: 2px;
    }

    @media (max-width: 1360px) {
      main {
        grid-template-columns: 1fr 300px 260px;
      }

      .time-control {
        gap: 12px;
        padding: 10px 14px;
      }
    }

    @media (max-width: 1100px) {
      body {
        overflow: auto;
      }

      header {
        padding: 12px;
      }

      .header-controls {
        width: 100%;
        justify-content: flex-start;
        gap: 8px;
      }

      main {
        grid-template-columns: 1fr;
        overflow: visible;
      }

      .canvas-area {
        min-height: 56vh;
      }

      .time-control {
        position: static;
        transform: none;
        margin: 12px;
        width: calc(100% - 24px);
        justify-content: space-between;
        flex-wrap: wrap;
      }

      .sidebar {
        border-left: none;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding: 14px;
      }

      #analytics-panel {
        max-height: none;
      }
    }

    @media (max-width: 768px) {
      .header-controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        width: 100%;
      }

      .header-controls .back-link {
        grid-column: 1 / -1;
      }

      .header-controls .btn,
      .header-controls .status-badge {
        width: 100%;
        justify-content: center;
      }

      .time-control {
        gap: 10px;
      }
    }

    @media (max-width: 640px) {
      .logo {
        font-size: 1.1rem;
      }

      .time-display {
        font-size: 20px;
      }

      .speed-control {
        width: 100%;
        justify-content: space-between;
      }

      .speed-btn {
        flex: 1;
      }

      .sidebar {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">📊 Analytics Dashboard</div>
    <div class="header-controls">
      <a href="index-v2.html" class="btn btn-secondary back-link">← Back to Menu</a>
      <a href="simulation.html" class="btn btn-secondary back-link">🧪 Open Simulation</a>
      <div class="status-badge">
        <div class="status-dot"></div>
        <span id="sim-status">Running</span>
      </div>
      <button class="btn btn-secondary" id="btn-import-report">📥 Import Report</button>
      <input type="file" id="report-file-input" accept="application/json,.json" hidden />
      <button class="btn btn-secondary" id="btn-pause">⏸ Pause</button>
      <button class="btn btn-primary" id="btn-screenshot">📷 Screenshot</button>
    </div>
  </header>

  <main>
    <section class="canvas-area">
      <canvas id="analytics-canvas"></canvas>
      <div class="time-control">
        <button class="btn btn-secondary" id="btn-rewind">⏪</button>
        <div class="time-display" id="sim-time">08:00</div>
        <div class="speed-control">
          <button class="speed-btn" data-speed="0.5">0.5x</button>
          <button class="speed-btn active" data-speed="1">1x</button>
          <button class="speed-btn" data-speed="2">2x</button>
          <button class="speed-btn" data-speed="5">5x</button>
        </div>
      </div>
    </section>

    <aside class="sidebar" id="analytics-sidebar">
      <div class="sidebar-title">Live Metrics</div>
      <div id="analytics-panel"></div>
    </aside>

    <aside class="sidebar" id="detail-sidebar">
      <div class="sidebar-title">Lab Assessment</div>
      <div id="lab-summary"></div>
      <div class="sidebar-title">Node Details</div>
      <div id="node-detail"></div>
    </aside>
  </main>

  <script type="module">
    import { CanvasRenderer } from './src/rendering/CanvasRenderer.js';
    import { MetricsCollector } from './src/analytics/MetricsCollector.js';
    import { AnalyticsPanel } from './src/analytics/AnalyticsPanel.js';
    import { NodeDetailView } from './src/analytics/NodeDetailView.js';
    import { SimulationController, TRAFFIC_PATTERNS } from './src/engine/SimulationController.js';
    import { LifecycleManager } from './src/utils/lifecycle.js';
    import { normalizeTopology } from './src/utils/topologySchema.js';

    const STORAGE_KEYS = {
      latestLabReport: 'network-training-lab-report-latest',
      playgroundTopology: 'playground-topology',
    };

    const demoTopology = {
      nodes: [
        { id: 'internet', label: 'Internet', type: 'cloud', position: { x: 0.5, y: 0.08 }, load: 0.4 },
        { id: 'firewall', label: 'Firewall', type: 'firewall', position: { x: 0.5, y: 0.22 }, load: 0.6 },
        { id: 'core1', label: 'Core-1', type: 'coreRouter', position: { x: 0.3, y: 0.4 }, load: 0.7 },
        { id: 'core2', label: 'Core-2', type: 'coreRouter', position: { x: 0.7, y: 0.4 }, load: 0.65 },
        { id: 'sw1', label: 'Switch-A', type: 'switch', position: { x: 0.15, y: 0.6 }, load: 0.5 },
        { id: 'sw2', label: 'Switch-B', type: 'switch', position: { x: 0.45, y: 0.6 }, load: 0.45 },
        { id: 'sw3', label: 'Switch-C', type: 'switch', position: { x: 0.75, y: 0.6 }, load: 0.55 },
        { id: 'ap1', label: 'AP-Lab', type: 'accessPoint', position: { x: 0.1, y: 0.82 }, load: 0.7 },
        { id: 'srv1', label: 'App Server', type: 'server', position: { x: 0.3, y: 0.82 }, load: 0.85 },
        { id: 'srv2', label: 'DB Server', type: 'server', position: { x: 0.5, y: 0.82 }, load: 0.6 },
        { id: 'lab1', label: 'XR Lab', type: 'lab', position: { x: 0.7, y: 0.82 }, load: 0.9 },
        { id: 'iot1', label: 'Sensors', type: 'iot', position: { x: 0.9, y: 0.82 }, load: 0.25 },
      ],
      links: [
        { id: 'l1', source: 'internet', target: 'firewall', type: 'wan' },
        { id: 'l2', source: 'firewall', target: 'core1', type: 'fiber' },
        { id: 'l3', source: 'firewall', target: 'core2', type: 'fiber' },
        { id: 'l4', source: 'core1', target: 'core2', type: 'fiber' },
        { id: 'l5', source: 'core1', target: 'sw1', type: 'ethernet' },
        { id: 'l6', source: 'core1', target: 'sw2', type: 'ethernet' },
        { id: 'l7', source: 'core2', target: 'sw2', type: 'ethernet' },
        { id: 'l8', source: 'core2', target: 'sw3', type: 'ethernet' },
        { id: 'l9', source: 'sw1', target: 'ap1', type: 'ethernet' },
        { id: 'l10', source: 'sw1', target: 'srv1', type: 'ethernet' },
        { id: 'l11', source: 'sw2', target: 'srv2', type: 'ethernet' },
        { id: 'l12', source: 'sw3', target: 'lab1', type: 'ethernet' },
        { id: 'l13', source: 'sw3', target: 'iot1', type: 'wireless' },
      ],
    };

    const canvas = document.getElementById('analytics-canvas');
    const pauseBtn = document.getElementById('btn-pause');
    const statusTextEl = document.getElementById('sim-status');
    const statusDotEl = document.querySelector('.status-dot');
    const importReportBtn = document.getElementById('btn-import-report');
    const reportFileInput = document.getElementById('report-file-input');
    const lifecycle = new LifecycleManager();
    const on = (target, event, handler, options) => lifecycle.on(target, event, handler, options);
    const renderer = new CanvasRenderer(canvas, { showGrid: true });
    const metricsCollector = new MetricsCollector();
    const analyticsPanel = new AnalyticsPanel(document.getElementById('analytics-panel'), metricsCollector);
    const nodeDetailView = new NodeDetailView(document.getElementById('node-detail'), metricsCollector);

    const analysisContext = loadAnalysisContext();
    renderLabSummary(analysisContext.report, analysisContext.source);

    const simController = new SimulationController(renderer, {
      onTick: (state) => {
        document.getElementById('sim-time').textContent = state.formattedTime;
        metricsCollector.update({
          nodes: renderer.nodes,
          links: renderer.links,
          particles: renderer.particleSystem.getCount(),
        });
      },
      onAlert: (alert) => {
        if (alert.type === 'failure') {
          setStatus('Running (with failures)', '#f59e0b');
        }
      },
    });

    preloadIcons().then((iconCache) => {
      renderer.setIconCache(iconCache);
      renderer.setTopology(analysisContext.topology);
      applyReportSimulationState(analysisContext.report);
      updateSpeedButtons(simController.getState().speed || 1);
      simController.start();
      metricsCollector.update({
        nodes: renderer.nodes,
        links: renderer.links,
        particles: renderer.particleSystem.getCount(),
      });
      analyticsPanel.update();
      setStatus('Running', '#22c55e');
    });

    on(canvas, 'click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const node = renderer.findNodeAt(x, y);
      if (!node) {
        renderer.selectNode(null);
        nodeDetailView.clear();
        return;
      }

      renderer.selectNode(node.id);
      nodeDetailView.showNode(node);
    });

    on(pauseBtn, 'click', () => {
      if (!simController.isRunning) {
        simController.start();
        pauseBtn.textContent = '⏸ Pause';
        setStatus('Running', '#22c55e');
        return;
      }

      const paused = simController.togglePause();
      pauseBtn.textContent = paused ? '▶ Resume' : '⏸ Pause';
      setStatus(paused ? 'Paused' : 'Running', paused ? '#f59e0b' : '#22c55e');
    });

    document.querySelectorAll('.speed-btn').forEach((btn) => {
      on(btn, 'click', () => {
        const speed = Number(btn.dataset.speed);
        if (!Number.isFinite(speed) || speed <= 0) return;
        simController.setSpeed(speed);
        updateSpeedButtons(speed);
      });
    });

    on(document.getElementById('btn-rewind'), 'click', () => {
      simController.setTime(8);
      document.getElementById('sim-time').textContent = '08:00';
    });

    on(document.getElementById('btn-screenshot'), 'click', () => {
      const link = document.createElement('a');
      link.download = `network-analytics-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    on(importReportBtn, 'click', () => {
      reportFileInput.click();
    });

    on(reportFileInput, 'change', async () => {
      const file = reportFileInput.files?.[0];
      reportFileInput.value = '';
      if (!file) return;

      try {
        const parsed = JSON.parse(await file.text());
        if (!isValidReport(parsed)) {
          throw new Error('Invalid report payload');
        }
        localStorage.setItem(STORAGE_KEYS.latestLabReport, JSON.stringify(parsed));
        window.location.reload();
      } catch (error) {
        console.error('[analytics] Failed to import report:', error);
        window.alert('Invalid report file. Please select a JSON exported from simulation.');
      }
    });

    function preloadIcons() {
      const iconCache = new Map();
      const iconNames = ['router', 'switch', 'server', 'firewall', 'wifi', 'sensor', 'cloud', 'lab'];
      return Promise.all(iconNames.map((name) => new Promise((resolve) => {
        const img = new Image();
        img.src = `icons/${name}.svg`;
        img.onload = () => {
          iconCache.set(`${name}.svg`, img);
          iconCache.set(name, img);
          resolve();
        };
        img.onerror = () => resolve();
      }))).then(() => iconCache);
    }

    function parseStorageJson(key) {
      const raw = localStorage.getItem(key);
      if (!raw) return null;
      try {
        return JSON.parse(raw);
      } catch (error) {
        console.warn(`[analytics] Failed to parse ${key}:`, error);
        return null;
      }
    }

    function normalizeForCanvas(topology) {
      const normalized = normalizeTopology(topology, {
        canvasWidth: canvas.clientWidth || canvas.offsetWidth || 1000,
        canvasHeight: canvas.clientHeight || canvas.offsetHeight || 600,
      });
      if (normalized.nodes.length === 0) return null;
      return {
        nodes: normalized.nodes,
        links: normalized.links,
      };
    }

    function loadAnalysisContext() {
      const report = parseStorageJson(STORAGE_KEYS.latestLabReport);
      if (isValidReport(report)) {
        const reportTopology = normalizeForCanvas(report.topology);
        if (reportTopology) {
          return { topology: reportTopology, report, source: 'latest-report' };
        }
      }

      const playgroundTopology = parseStorageJson(STORAGE_KEYS.playgroundTopology);
      const normalizedPlayground = playgroundTopology ? normalizeForCanvas(playgroundTopology) : null;
      if (normalizedPlayground) {
        return { topology: normalizedPlayground, report: null, source: 'playground' };
      }

      return {
        topology: normalizeForCanvas(demoTopology) || demoTopology,
        report: null,
        source: 'demo',
      };
    }

    function isValidReport(report) {
      return Boolean(
        report &&
        typeof report === 'object' &&
        report.topology &&
        report.evaluation
      );
    }

    function applyReportSimulationState(report) {
      const state = report?.simulationState;
      if (!state) return;

      const pattern = String(state.pattern || '').trim();
      if (pattern && TRAFFIC_PATTERNS[pattern]) {
        simController.setTrafficPattern(pattern);
      }

      const speed = Number(state.speed);
      if (Number.isFinite(speed) && speed > 0) {
        simController.setSpeed(speed);
      }

      const time = Number(state.time);
      if (Number.isFinite(time) && time >= 0 && time <= 24) {
        simController.setTime(time);
        document.getElementById('sim-time').textContent = simController.getState().formattedTime;
      }
    }

    function updateSpeedButtons(speed) {
      document.querySelectorAll('.speed-btn').forEach((btn) => {
        const buttonSpeed = Number(btn.dataset.speed);
        const isActive = Math.abs(buttonSpeed - speed) < 0.0001;
        btn.classList.toggle('active', isActive);
      });
    }

    function setStatus(label, color) {
      statusTextEl.textContent = label;
      statusDotEl.style.background = color;
    }

    function formatDateTime(isoDate) {
      if (!isoDate) return 'Unknown';
      const date = new Date(isoDate);
      if (Number.isNaN(date.getTime())) return 'Unknown';
      return date.toLocaleString();
    }

    function statusClassForResult(status) {
      if (status === 'passed') return 'pass';
      if (status === 'at-risk') return 'warn';
      return 'progress';
    }

    function recommendationForObjective(objective) {
      const metric = String(objective?.metric || '');
      switch (metric) {
        case 'peak_utilization':
          return 'Reduce bottlenecks: upgrade overloaded links or rebalance traffic paths.';
        case 'peak_latency':
        case 'avg_latency':
          return 'Lower delay: shorten path depth and prioritize low-latency uplinks for critical traffic.';
        case 'peak_packet_loss':
        case 'avg_packet_loss':
          return 'Contain packet loss: increase queue limits and reduce oversubscription on stressed segments.';
        case 'avg_throughput':
        case 'min_throughput':
          return 'Raise throughput: increase interface speeds on core nodes and match edge bandwidth profiles.';
        case 'peak_active_failures':
          return 'Improve resilience: add redundant links and isolate failure domains near the core.';
        case 'recovery_time_seconds':
          return 'Speed recovery: practice failover actions earlier and keep concurrent failures below threshold.';
        case 'event_failure_injected':
          return 'Complete the lab by injecting at least one controlled failure and observing recovery.';
        case 'event_traffic_spike':
          return 'Complete the lab by simulating a traffic spike and evaluating service quality impact.';
        default:
          return `Improve objective: ${objective?.title || 'tune topology and rerun scenario'}.`;
      }
    }

    function buildRecommendations(failedObjectives) {
      if (!failedObjectives.length) {
        return ['All objectives passed. Capture this as your reference baseline run.'];
      }

      const recommendations = failedObjectives.map(recommendationForObjective);
      return [...new Set(recommendations)].slice(0, 3);
    }

    function renderLabSummary(report, source) {
      const container = document.getElementById('lab-summary');
      if (!isValidReport(report)) {
        const sourceLabel = source === 'playground'
          ? 'playground topology'
          : source === 'demo'
            ? 'default demo topology'
            : 'local data';
        container.innerHTML = `
          <div class="lab-empty">
            No lab report loaded. Analytics is running with ${sourceLabel}.<br />
            Use <strong>Import Report</strong> or open Analytics from Simulation.
          </div>
        `;
        return;
      }

      const evaluation = report.evaluation || {};
      const objectives = Array.isArray(evaluation.objectives) ? evaluation.objectives : [];
      const failedObjectives = objectives.filter((objective) => !objective.passed);
      const recommendations = buildRecommendations(failedObjectives);
      const roundedScore = Math.round(Number(evaluation.score) || 0);
      const className = statusClassForResult(evaluation.status);
      const sourceLabel = source === 'latest-report' ? 'latest local report' : source;

      container.innerHTML = `
        <div class="lab-summary-card">
          <div class="lab-summary-title">${report.scenario?.label || evaluation.scenarioLabel || 'Lab Scenario'}</div>
          <div class="lab-summary-meta">
            <span>${formatDateTime(report.generatedAt)}</span>
            <span>${sourceLabel}</span>
          </div>
          <div class="lab-scoreline">
            <span>Status</span>
            <strong class="${className}">${roundedScore}%</strong>
          </div>
        </div>
        <div class="lab-summary-card">
          <div class="lab-summary-title">Objective Status</div>
          <div class="lab-objective-list">
            ${objectives.slice(0, 5).map((objective) => `
              <div class="lab-objective-item ${objective.passed ? 'pass' : 'fail'}">
                ${objective.title}
              </div>
            `).join('')}
          </div>
        </div>
        <div class="lab-summary-card">
          <div class="lab-summary-title">Recommended Next Fixes</div>
          <div class="lab-recommend-list">
            ${recommendations.map((line) => `<div class="lab-recommend-item">${line}</div>`).join('')}
          </div>
        </div>
      `;
    }

    on(window, 'beforeunload', () => {
      lifecycle.cleanup();
      analyticsPanel.destroy();
      nodeDetailView.destroy();
      simController.destroy();
      renderer.destroy();
    });
  </script>
</body>
</html>
