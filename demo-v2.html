<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Didar Network v2 - Enhanced Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0f1a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 32px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
    }

    h1 {
      font-size: clamp(1.1rem, 2.2vw, 1.5rem);
      font-weight: 600;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      min-width: 0;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-1px);
    }

    a.btn {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-danger {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
    }

    .btn-danger:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4);
    }

    main {
      flex: 1;
      padding: 24px;
      display: flex;
      gap: 24px;
      min-height: 0;
    }

    .canvas-container {
      flex: 1;
      background: rgba(15, 23, 42, 0.5);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
      min-height: 520px;
      min-width: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .stats-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(12px);
      padding: 16px 24px;
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #6366f1;
    }

    .stat-label {
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .controls-panel {
      width: min(100%, 320px);
      background: rgba(15, 23, 42, 0.5);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      flex-shrink: 0;
      min-width: 0;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .control-label {
      font-size: 13px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .slider-control {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .slider-value {
      font-size: 14px;
      color: #6366f1;
      font-weight: 600;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
      -webkit-appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      cursor: pointer;
      border: none;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(99, 102, 241, 0.1);
      border-radius: 8px;
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .legend {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #94a3b8;
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    .btn:focus-visible,
    input[type="range"]:focus-visible {
      outline: 2px solid rgba(99, 102, 241, 0.9);
      outline-offset: 2px;
    }

    @media (max-width: 1260px) {
      header {
        padding: 16px 20px;
      }

      main {
        padding: 16px;
        gap: 16px;
      }

      .controls-panel {
        width: min(100%, 300px);
        padding: 18px;
      }
    }

    @media (max-width: 980px) {
      main {
        flex-direction: column;
      }

      .controls-panel {
        width: 100%;
      }

      .canvas-container {
        min-height: 56vh;
      }
    }

    @media (max-width: 640px) {
      header {
        padding: 12px;
      }

      .controls {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .controls .btn {
        width: 100%;
        min-width: 0;
        flex: none;
        padding: 8px 10px;
        font-size: 12px;
      }

      .controls a.btn {
        grid-column: 1 / -1;
      }

      .stats-bar {
        position: static;
        margin-top: auto;
        padding: 12px;
        gap: 12px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stat-value {
        font-size: 20px;
      }

      .controls-panel {
        padding: 14px;
        gap: 14px;
      }
    }

    @media (max-width: 420px) {
      .stats-bar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>🌐 Didar Network v2 - Enhanced Visualization Demo</h1>
    <div class="controls">
      <a href="index-v2.html" class="btn btn-secondary">← Back to Menu</a>
      <button id="btn-play" class="btn btn-primary">▶ Start Simulation</button>
      <button id="btn-reset" class="btn btn-secondary">⟳ Reset</button>
      <button id="btn-screenshot" class="btn btn-secondary">📷 Screenshot</button>
      <button id="btn-export" class="btn btn-secondary">💾 Export JSON</button>
    </div>
  </header>

  <main>
    <div class="canvas-container">
      <canvas id="demo-canvas"></canvas>
      <div class="stats-bar">
        <div class="stat">
          <div class="stat-value" id="stat-nodes">0</div>
          <div class="stat-label">Nodes</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-links">0</div>
          <div class="stat-label">Links</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-packets">0</div>
          <div class="stat-label">Packets</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-fps">60</div>
          <div class="stat-label">FPS</div>
        </div>
      </div>
    </div>

    <div class="controls-panel">
      <div class="control-group">
        <div class="control-label">Simulation Status</div>
        <div class="status-indicator">
          <div class="status-dot"></div>
          <span id="status-text">Ready</span>
        </div>
      </div>

      <div class="control-group">
        <div class="control-label">Traffic Intensity</div>
        <div class="slider-control">
          <div class="slider-header">
            <span>Load</span>
            <span class="slider-value" id="traffic-value">50%</span>
          </div>
          <input type="range" id="traffic-slider" min="0" max="100" value="50" />
        </div>
      </div>

      <div class="control-group">
        <div class="control-label">Packet Loss</div>
        <div class="slider-control">
          <div class="slider-header">
            <span>Loss Rate</span>
            <span class="slider-value" id="loss-value">0%</span>
          </div>
          <input type="range" id="loss-slider" min="0" max="50" value="0" />
        </div>
      </div>

      <div class="control-group">
        <div class="control-label">Animation Speed</div>
        <div class="slider-control">
          <div class="slider-header">
            <span>Speed</span>
            <span class="slider-value" id="speed-value">1x</span>
          </div>
          <input type="range" id="speed-slider" min="0.1" max="3" step="0.1" value="1" />
        </div>
      </div>

      <div class="control-group">
        <div class="control-label">Node Status Legend</div>
        <div class="legend">
          <div class="legend-item">
            <div class="legend-color" style="background: #4ade80"></div>
            <span>Healthy (< 60%)</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #fbbf24"></div>
            <span>Warning (60-80%)</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #f87171"></div>
            <span>Critical (> 80%)</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { CanvasRenderer } from './src/rendering/CanvasRenderer.js';

    // Demo topology
    const demoTopology = {
      nodes: [
        { id: 'internet', label: 'Internet', type: 'cloud', position: { x: 0.5, y: 0.08 }, load: 0.3 },
        { id: 'firewall', label: 'Firewall', type: 'firewall', position: { x: 0.5, y: 0.22 }, load: 0.6 },
        { id: 'core1', label: 'Core-1', type: 'coreRouter', position: { x: 0.35, y: 0.38 }, load: 0.75 },
        { id: 'core2', label: 'Core-2', type: 'coreRouter', position: { x: 0.65, y: 0.38 }, load: 0.65 },
        { id: 'sw1', label: 'Switch-A', type: 'switch', position: { x: 0.2, y: 0.55 }, load: 0.5 },
        { id: 'sw2', label: 'Switch-B', type: 'switch', position: { x: 0.5, y: 0.55 }, load: 0.4 },
        { id: 'sw3', label: 'Switch-C', type: 'switch', position: { x: 0.8, y: 0.55 }, load: 0.55 },
        { id: 'ap1', label: 'AP-Lab', type: 'accessPoint', position: { x: 0.15, y: 0.75 }, load: 0.7 },
        { id: 'srv1', label: 'App Server', type: 'server', position: { x: 0.35, y: 0.75 }, load: 0.85 },
        { id: 'srv2', label: 'DB Server', type: 'server', position: { x: 0.5, y: 0.75 }, load: 0.6 },
        { id: 'lab1', label: 'XR Lab', type: 'lab', position: { x: 0.65, y: 0.75 }, load: 0.9 },
        { id: 'iot1', label: 'Sensors', type: 'iot', position: { x: 0.85, y: 0.75 }, load: 0.25 },
      ],
      links: [
        { id: 'l1', source: 'internet', target: 'firewall', type: 'wan', bandwidth: 1000 },
        { id: 'l2', source: 'firewall', target: 'core1', type: 'fiber', bandwidth: 10000 },
        { id: 'l3', source: 'firewall', target: 'core2', type: 'fiber', bandwidth: 10000 },
        { id: 'l4', source: 'core1', target: 'core2', type: 'fiber', bandwidth: 10000 },
        { id: 'l5', source: 'core1', target: 'sw1', type: 'ethernet', bandwidth: 1000 },
        { id: 'l6', source: 'core1', target: 'sw2', type: 'ethernet', bandwidth: 1000 },
        { id: 'l7', source: 'core2', target: 'sw2', type: 'ethernet', bandwidth: 1000 },
        { id: 'l8', source: 'core2', target: 'sw3', type: 'ethernet', bandwidth: 1000 },
        { id: 'l9', source: 'sw1', target: 'ap1', type: 'ethernet', bandwidth: 100 },
        { id: 'l10', source: 'sw1', target: 'srv1', type: 'ethernet', bandwidth: 1000 },
        { id: 'l11', source: 'sw2', target: 'srv2', type: 'ethernet', bandwidth: 1000 },
        { id: 'l12', source: 'sw3', target: 'lab1', type: 'ethernet', bandwidth: 1000 },
        { id: 'l13', source: 'sw3', target: 'iot1', type: 'wireless', bandwidth: 100 },
      ],
    };

    // Initialize renderer
    const canvas = document.getElementById('demo-canvas');
    const renderer = new CanvasRenderer(canvas, { showGrid: true });

    // Preload icons
    const iconCache = new Map();
    const iconNames = ['router', 'switch', 'server', 'firewall', 'wifi', 'sensor', 'cloud', 'lab'];
    
    Promise.all(iconNames.map(name => {
      return new Promise((resolve) => {
        const img = new Image();
        img.src = `icons/${name}.svg`;
        img.onload = () => {
          iconCache.set(name + '.svg', img);
          iconCache.set(name, img);
          resolve();
        };
        img.onerror = () => resolve();
      });
    })).then(() => {
      renderer.setIconCache(iconCache);
      renderer.setTopology(demoTopology);
      updateStats();
    });

    // UI Controls
    const playBtn = document.getElementById('btn-play');
    const resetBtn = document.getElementById('btn-reset');
    const screenshotBtn = document.getElementById('btn-screenshot');
    const exportBtn = document.getElementById('btn-export');
    const trafficSlider = document.getElementById('traffic-slider');
    const lossSlider = document.getElementById('loss-slider');
    const speedSlider = document.getElementById('speed-slider');
    const statusText = document.getElementById('status-text');

    let isPlaying = false;

    playBtn.addEventListener('click', () => {
      if (isPlaying) {
        renderer.pause();
        playBtn.textContent = '▶ Start Simulation';
        statusText.textContent = 'Paused';
      } else {
        renderer.resume();
        playBtn.textContent = '⏸ Pause';
        statusText.textContent = 'Running';
      }
      isPlaying = !isPlaying;
    });

    resetBtn.addEventListener('click', () => {
      renderer.setTopology(demoTopology);
      trafficSlider.value = 50;
      lossSlider.value = 0;
      speedSlider.value = 1;
      updateSliderLabels();
      updateStats();
    });

    // Screenshot functionality
    screenshotBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = `network-viz-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    // Export JSON functionality
    exportBtn.addEventListener('click', () => {
      const data = JSON.stringify(demoTopology, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = `topology-${Date.now()}.json`;
      link.href = url;
      link.click();
      URL.revokeObjectURL(url);
    });

    trafficSlider.addEventListener('input', () => {
      updateSliderLabels();
      renderer.setGlobalLoad(trafficSlider.value / 100);
    });

    lossSlider.addEventListener('input', () => {
      updateSliderLabels();
      demoTopology.links.forEach(link => {
        const loss = lossSlider.value / 100;
        const status = loss > 0.3 ? 'lossy' : loss > 0.1 ? 'degraded' : 'up';
        renderer.updateLinkHealth(link.id, { status, flow: 1 - loss * 0.5, loss });
      });
    });

    // Fixed speed slider to actually affect particle animation
    speedSlider.addEventListener('input', () => {
      updateSliderLabels();
      const speed = parseFloat(speedSlider.value);
      if (renderer.particleSystem && renderer.particleSystem.setSpeed) {
        renderer.particleSystem.setSpeed(speed);
      }
    });

    function updateSliderLabels() {
      document.getElementById('traffic-value').textContent = trafficSlider.value + '%';
      document.getElementById('loss-value').textContent = lossSlider.value + '%';
      document.getElementById('speed-value').textContent = speedSlider.value + 'x';
    }

    function updateStats() {
      document.getElementById('stat-nodes').textContent = renderer.nodes.length;
      document.getElementById('stat-links').textContent = renderer.links.length;
      document.getElementById('stat-packets').textContent = renderer.particleSystem.getCount();
    }

    // FPS counter
    setInterval(() => {
      document.getElementById('stat-fps').textContent = Math.round(1000 / (renderer.frameTime || 16.67));
      document.getElementById('stat-packets').textContent = renderer.particleSystem.getCount();
    }, 500);

    // Start automatically
    renderer.start();
    isPlaying = true;
    playBtn.textContent = '⏸ Pause';
    statusText.textContent = 'Running';
  </script>
</body>
</html>
