<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Didar Network v2 - Enhanced Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0f1a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 32px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .btn-danger {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 0;
    }

    .canvas-container {
      position: relative;
      background: #0a0f1a;
      overflow: hidden;
    }

    #demo-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .stats-bar {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      gap: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #22c55e, #14b8a6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .sidebar {
      background: rgba(15, 23, 42, 0.95);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px;
      overflow-y: auto;
    }

    .panel {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .panel-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .slider-group {
      margin-bottom: 16px;
    }

    .slider-group label {
      display: flex;
      justify-content: space-between;
      font-size: 0.875rem;
      margin-bottom: 8px;
    }

    .slider-group input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    .slider-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 50%;
      cursor: pointer;
    }

    .device-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .device-btn {
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #e2e8f0;
      cursor: pointer;
      font-size: 0.75rem;
      text-align: center;
      transition: all 0.2s;
    }

    .device-btn:hover {
      background: rgba(99, 102, 241, 0.2);
      border-color: #6366f1;
    }

    .device-btn img {
      width: 32px;
      height: 32px;
      margin-bottom: 4px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(34, 197, 94, 0.1);
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🌐 Didar Network v2 - Enhanced Visualization Demo</h1>
    <div class="controls">
      <button id="btn-play" class="btn btn-primary">▶ Start Simulation</button>
      <button id="btn-reset" class="btn btn-secondary">⟳ Reset</button>
      <button id="btn-chaos" class="btn btn-danger">💥 Trigger Failure</button>
    </div>
  </header>

  <main>
    <div class="canvas-container">
      <canvas id="demo-canvas"></canvas>
      <div class="stats-bar">
        <div class="stat">
          <div class="stat-value" id="stat-nodes">0</div>
          <div class="stat-label">Nodes</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-links">0</div>
          <div class="stat-label">Links</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-packets">0</div>
          <div class="stat-label">Packets</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-fps">0</div>
          <div class="stat-label">FPS</div>
        </div>
      </div>
    </div>

    <aside class="sidebar">
      <div class="panel">
        <div class="panel-title">Status</div>
        <div class="status-indicator">
          <div class="status-dot"></div>
          <span id="status-text">Idle</span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Simulation Controls</div>
        <div class="slider-group">
          <label>
            Traffic Intensity
            <span id="traffic-value">50%</span>
          </label>
          <input type="range" id="traffic-slider" min="0" max="100" value="50" />
        </div>
        <div class="slider-group">
          <label>
            Packet Loss
            <span id="loss-value">0%</span>
          </label>
          <input type="range" id="loss-slider" min="0" max="50" value="0" />
        </div>
        <div class="slider-group">
          <label>
            Animation Speed
            <span id="speed-value">1x</span>
          </label>
          <input type="range" id="speed-slider" min="1" max="10" value="1" />
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Device Types</div>
        <div class="device-grid">
          <div class="device-btn">
            <img src="icons/router.svg" alt="Router" />
            <div>Router</div>
          </div>
          <div class="device-btn">
            <img src="icons/switch.svg" alt="Switch" />
            <div>Switch</div>
          </div>
          <div class="device-btn">
            <img src="icons/server.svg" alt="Server" />
            <div>Server</div>
          </div>
          <div class="device-btn">
            <img src="icons/firewall.svg" alt="Firewall" />
            <div>Firewall</div>
          </div>
          <div class="device-btn">
            <img src="icons/wifi.svg" alt="AP" />
            <div>Access Point</div>
          </div>
          <div class="device-btn">
            <img src="icons/sensor.svg" alt="IoT" />
            <div>IoT Sensor</div>
          </div>
          <div class="device-btn">
            <img src="icons/cloud.svg" alt="Cloud" />
            <div>Cloud</div>
          </div>
          <div class="device-btn">
            <img src="icons/lab.svg" alt="Lab" />
            <div>Lab</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Link Status Legend</div>
        <div class="legend">
          <div class="legend-item">
            <div class="legend-color" style="background: #22c55e;"></div>
            <span>Healthy</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #eab308;"></div>
            <span>Degraded</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #f59e0b;"></div>
            <span>Lossy</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #ef4444;"></div>
            <span>Down</span>
          </div>
        </div>
      </div>
    </aside>
  </main>

  <script type="module">
    import { CanvasRenderer } from './src/rendering/CanvasRenderer.js';

    // Demo topology
    const demoTopology = {
      nodes: [
        { id: 'internet', label: 'Internet', type: 'cloud', position: { x: 0.5, y: 0.08 }, load: 0.3 },
        { id: 'firewall', label: 'Firewall', type: 'firewall', position: { x: 0.5, y: 0.22 }, load: 0.6 },
        { id: 'core1', label: 'Core-1', type: 'coreRouter', position: { x: 0.35, y: 0.38 }, load: 0.75 },
        { id: 'core2', label: 'Core-2', type: 'coreRouter', position: { x: 0.65, y: 0.38 }, load: 0.65 },
        { id: 'sw1', label: 'Switch-A', type: 'switch', position: { x: 0.2, y: 0.55 }, load: 0.5 },
        { id: 'sw2', label: 'Switch-B', type: 'switch', position: { x: 0.5, y: 0.55 }, load: 0.4 },
        { id: 'sw3', label: 'Switch-C', type: 'switch', position: { x: 0.8, y: 0.55 }, load: 0.55 },
        { id: 'ap1', label: 'AP-Lab', type: 'accessPoint', position: { x: 0.15, y: 0.75 }, load: 0.7 },
        { id: 'srv1', label: 'App Server', type: 'server', position: { x: 0.35, y: 0.75 }, load: 0.85 },
        { id: 'srv2', label: 'DB Server', type: 'server', position: { x: 0.5, y: 0.75 }, load: 0.6 },
        { id: 'lab1', label: 'XR Lab', type: 'lab', position: { x: 0.65, y: 0.75 }, load: 0.9 },
        { id: 'iot1', label: 'Sensors', type: 'iot', position: { x: 0.85, y: 0.75 }, load: 0.25 },
      ],
      links: [
        { id: 'l1', source: 'internet', target: 'firewall', type: 'wan', bandwidth: 1000 },
        { id: 'l2', source: 'firewall', target: 'core1', type: 'fiber', bandwidth: 10000 },
        { id: 'l3', source: 'firewall', target: 'core2', type: 'fiber', bandwidth: 10000 },
        { id: 'l4', source: 'core1', target: 'core2', type: 'fiber', bandwidth: 10000 },
        { id: 'l5', source: 'core1', target: 'sw1', type: 'ethernet', bandwidth: 1000 },
        { id: 'l6', source: 'core1', target: 'sw2', type: 'ethernet', bandwidth: 1000 },
        { id: 'l7', source: 'core2', target: 'sw2', type: 'ethernet', bandwidth: 1000 },
        { id: 'l8', source: 'core2', target: 'sw3', type: 'ethernet', bandwidth: 1000 },
        { id: 'l9', source: 'sw1', target: 'ap1', type: 'ethernet', bandwidth: 100 },
        { id: 'l10', source: 'sw1', target: 'srv1', type: 'ethernet', bandwidth: 1000 },
        { id: 'l11', source: 'sw2', target: 'srv2', type: 'ethernet', bandwidth: 1000 },
        { id: 'l12', source: 'sw3', target: 'lab1', type: 'ethernet', bandwidth: 1000 },
        { id: 'l13', source: 'sw3', target: 'iot1', type: 'wireless', bandwidth: 100 },
      ],
    };

    // Initialize renderer
    const canvas = document.getElementById('demo-canvas');
    const renderer = new CanvasRenderer(canvas, { showGrid: true });

    // Preload icons
    const iconCache = new Map();
    const iconNames = ['router', 'switch', 'server', 'firewall', 'wifi', 'sensor', 'cloud', 'lab'];
    
    Promise.all(iconNames.map(name => {
      return new Promise((resolve) => {
        const img = new Image();
        img.src = `icons/${name}.svg`;
        img.onload = () => {
          iconCache.set(name + '.svg', img);
          iconCache.set(name, img);
          resolve();
        };
        img.onerror = () => resolve();
      });
    })).then(() => {
      renderer.setIconCache(iconCache);
      renderer.setTopology(demoTopology);
      updateStats();
    });

    // UI Controls
    const playBtn = document.getElementById('btn-play');
    const resetBtn = document.getElementById('btn-reset');
    const chaosBtn = document.getElementById('btn-chaos');
    const statusText = document.getElementById('status-text');
    const trafficSlider = document.getElementById('traffic-slider');
    const lossSlider = document.getElementById('loss-slider');
    const speedSlider = document.getElementById('speed-slider');

    let isPlaying = false;

    playBtn.addEventListener('click', () => {
      isPlaying = !isPlaying;
      if (isPlaying) {
        renderer.start();
        playBtn.textContent = '⏸ Pause';
        statusText.textContent = 'Running';
      } else {
        renderer.pause();
        playBtn.textContent = '▶ Resume';
        statusText.textContent = 'Paused';
      }
    });

    resetBtn.addEventListener('click', () => {
      renderer.setTopology(demoTopology);
      trafficSlider.value = 50;
      lossSlider.value = 0;
      updateSliderLabels();
      updateStats();
    });

    chaosBtn.addEventListener('click', () => {
      // Trigger random link failure
      const linkIds = demoTopology.links.map(l => l.id);
      const randomLink = linkIds[Math.floor(Math.random() * linkIds.length)];
      renderer.updateLinkHealth(randomLink, { status: 'down', flow: 0, loss: 1 });
      
      // Add burst of error particles
      renderer.particleSystem.addBurst(randomLink, 10, 'error');
      
      setTimeout(() => {
        renderer.updateLinkHealth(randomLink, { status: 'up', flow: 1, loss: 0 });
      }, 5000);
    });

    trafficSlider.addEventListener('input', () => {
      updateSliderLabels();
      renderer.setGlobalLoad(trafficSlider.value / 100);
    });

    lossSlider.addEventListener('input', () => {
      updateSliderLabels();
      demoTopology.links.forEach(link => {
        const loss = lossSlider.value / 100;
        const status = loss > 0.3 ? 'lossy' : loss > 0.1 ? 'degraded' : 'up';
        renderer.updateLinkHealth(link.id, { status, flow: 1 - loss * 0.5, loss });
      });
    });

    speedSlider.addEventListener('input', () => {
      updateSliderLabels();
    });

    function updateSliderLabels() {
      document.getElementById('traffic-value').textContent = trafficSlider.value + '%';
      document.getElementById('loss-value').textContent = lossSlider.value + '%';
      document.getElementById('speed-value').textContent = speedSlider.value + 'x';
    }

    function updateStats() {
      document.getElementById('stat-nodes').textContent = renderer.nodes.length;
      document.getElementById('stat-links').textContent = renderer.links.length;
      document.getElementById('stat-packets').textContent = renderer.particleSystem.getCount();
    }

    // FPS counter
    setInterval(() => {
      document.getElementById('stat-fps').textContent = Math.round(1000 / (renderer.frameTime || 16.67));
      document.getElementById('stat-packets').textContent = renderer.particleSystem.getCount();
    }, 500);

    // Start automatically
    renderer.start();
    isPlaying = true;
    playBtn.textContent = '⏸ Pause';
    statusText.textContent = 'Running';
  </script>
</body>
</html>
