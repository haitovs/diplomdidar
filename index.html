<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=index-v2.html">
  <title>Redirecting to Network Training Simulator</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #0a0f1a 0%, #1a1f2e 100%);
      color: #f8fafc;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #94a3b8;
      margin-bottom: 1.5rem;
    }
    a {
      color: #6366f1;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border: 1px solid #6366f1;
      border-radius: 8px;
      display: inline-block;
      transition: all 0.2s;
    }
    a:hover {
      background: #6366f1;
      color: white;
    }
    .spinner {
      border: 3px solid rgba(99, 102, 241, 0.1);
      border-top: 3px solid #6366f1;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <script>
    // Immediate redirect
    window.location.href = 'index-v2.html';
  </script>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>🌐 Network Training Simulator</h1>
    <p>Redirecting to the new interface...</p>
    <a href="index-v2.html">Click here if not redirected automatically</a>
  </div>
</body>
</html>
